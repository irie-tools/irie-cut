name: Bug report
description: Something in the editor isn't working right
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Import a clip
        2. Add a keyframe on scale
        3. Export
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: e.g. Chrome 126 on macOS 15
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      description: Open devtools → Console, paste anything red
      render: shell
